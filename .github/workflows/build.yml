name: build

on:
  workflow_dispatch:

concurrency:
  group: openwrt-x86_64-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      OPENWRT_TARGET: x86
      OPENWRT_SUBTARGET: 64
      OPENWRT_ARCH: x86_64
      OPENWRT_PROFILE: generic
      OPENWRT_FS: squashfs
      OPENWRT_IMAGE: combined-efi.img.gz
      ROOTFS_PARTSIZE: 600
      BUILD_BASE: https://downloads.openwrt.org
      PACKAGES_FILE: cfg/pkgs.txt
      NIKKI_PACKAGES: ""  # Temporarily disabled - SNAPSHOT packages incompatible with stable releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq tar zstd rsync gh

      - name: Get latest release
        id: rel
        shell: bash
        run: |
          set -euo pipefail
          json="$(curl --retry 3 --retry-all-errors --connect-timeout 15 --max-time 60 -fsSL https://api.github.com/repos/openwrt/openwrt/releases/latest)"
          tag="$(printf '%s' "$json" | jq -r '.tag_name')"
          ver="${tag#v}"
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "failed to get latest official release" >&2
            exit 1
          fi
          file="openwrt-${ver}-${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}-${OPENWRT_PROFILE}-${OPENWRT_FS}-${OPENWRT_IMAGE}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ver=$ver" >> "$GITHUB_OUTPUT"
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Show build summary
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ steps.rel.outputs.ver }}"
          pkg_count="$(grep -vE '^\s*($|#)' "${GITHUB_WORKSPACE}/${PACKAGES_FILE}" | wc -l | tr -d ' ')"
          echo "OpenWrt version : $ver"
          echo "Target          : ${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
          echo "Profile         : ${OPENWRT_PROFILE}"
          echo "Image           : ${OPENWRT_FS} ${OPENWRT_IMAGE}"
          echo "Output          : openwrt-${ver}-${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}-${OPENWRT_PROFILE}-${OPENWRT_FS}-${OPENWRT_IMAGE}"
          echo "Packages        : $pkg_count"
          echo "Build source    : ${BUILD_BASE}"
          echo "Nikki arch      : ${OPENWRT_ARCH}"

      - name: Fetch Nikki feed packages
        if: env.NIKKI_PACKAGES != ''
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/fetch-nikki-release.sh "${{ steps.rel.outputs.ver }}" "${OPENWRT_ARCH}" "${NIKKI_PACKAGES}"
          echo "--- files/tmp/nikki-feed ---"
          find files/tmp/nikki-feed -maxdepth 2 -type f | sort || true

      - name: Download imagebuilder
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ steps.rel.outputs.ver }}"
          file="openwrt-imagebuilder-${ver}-${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}.Linux-x86_64.tar.zst"
          url="${BUILD_BASE}/releases/${ver}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}/${file}"
          echo "Downloading imagebuilder: $url"
          curl --retry 3 --retry-all-errors --connect-timeout 20 --max-time 180 -fL "$url" -o ib.tar.zst
          tar --zstd -xf ib.tar.zst
          mv openwrt-imagebuilder-* imagebuilder

      - name: Prepare files
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ steps.rel.outputs.ver }}"
          mkdir -p imagebuilder/files imagebuilder/packages
          if [ -d files ]; then
            rsync -a --exclude 'tmp/' files/ imagebuilder/files/
          fi
          if [ -d files/tmp/nikki-feed ]; then
            # Copy only apk/ipk files, not packages.adb (signature issues)
            # Let imagebuilder generate its own package index
            find files/tmp/nikki-feed -maxdepth 1 -type f \( -name '*.apk' -o -name '*.ipk' \) -exec cp -f {} imagebuilder/packages/ \;
          fi
          echo "--- imagebuilder/packages ---"
          find imagebuilder/packages -maxdepth 1 -type f | sort || true
          ls -lah imagebuilder/packages || true
          if [ -x scripts/tune.sh ]; then
            scripts/tune.sh imagebuilder "$ver"
          fi

      - name: Manifest preflight
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          pkgs="$(grep -vE '^\s*($|#)' "${GITHUB_WORKSPACE}/${PACKAGES_FILE}" | tr '\n' ' ' | xargs)"
          echo "Custom packages : $pkgs"
          cd imagebuilder
          if [ -f repositories.conf ]; then
            sed -i '/^option check_signature$/d' repositories.conf
          fi
          make manifest \
            PROFILE="${OPENWRT_PROFILE}" \
            PACKAGES="$pkgs" \
            CONFIG_SIGNATURE_CHECK= \
            2>&1 | tee "${GITHUB_WORKSPACE}/diagnostics/manifest.log"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          pkgs="$(grep -vE '^\s*($|#)' "${GITHUB_WORKSPACE}/${PACKAGES_FILE}" | tr '\n' ' ' | xargs)"
          echo "Custom packages : $pkgs"
          cd imagebuilder
          if [ -f repositories.conf ]; then
            sed -i '/^option check_signature$/d' repositories.conf
          fi
          make image \
            PROFILE="${OPENWRT_PROFILE}" \
            PACKAGES="$pkgs" \
            FILES="files" \
            ROOTFS_PARTSIZE="${ROOTFS_PARTSIZE}" \
            CONFIG_SIGNATURE_CHECK= \
            2>&1 | tee "${GITHUB_WORKSPACE}/diagnostics/build.log"

      - name: Collect diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          {
            echo "== imagebuilder/packages =="
            find imagebuilder/packages -maxdepth 1 -type f | sort || true
            echo
            echo "== imagebuilder/bin/targets =="
            find imagebuilder/bin/targets -maxdepth 3 -type f | sort || true
          } > diagnostics/tree.txt
          cp -f cfg/pkgs.txt diagnostics/pkgs.txt
          if [ -d files/tmp/nikki-feed ]; then
            find files/tmp/nikki-feed -maxdepth 1 -type f | sort > diagnostics/nikki-feed.txt || true
          fi

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: diagnostics/
          if-no-files-found: warn

      - name: Pick final image
        id: pick
        shell: bash
        run: |
          set -euo pipefail
          want="${{ steps.rel.outputs.file }}"
          src="$(find "imagebuilder/bin/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}" -type f -name "*${OPENWRT_PROFILE}*${OPENWRT_FS}*${OPENWRT_IMAGE}" | head -n 1)"
          if [ -z "$src" ]; then
            echo "final image not found" >&2
            find imagebuilder/bin/targets -maxdepth 3 -type f | sort >&2 || true
            exit 1
          fi
          mkdir -p out
          cp -f "$src" "out/$want"
          echo "path=out/$want" >> "$GITHUB_OUTPUT"
          echo "name=$want" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.rel.outputs.tag }}"
          ver="${{ steps.rel.outputs.ver }}"
          title="OpenWrt ${ver} · x86_64 EFI Image"
          notes=$"Official OpenWrt ${ver} x86_64 image.\n\nDownload the attached image file below."
          if gh release view "$tag" >/dev/null 2>&1; then
            existing_assets="$(gh release view "$tag" --json assets --jq '.assets[].name' || true)"
            if [ -n "$existing_assets" ]; then
              while IFS= read -r asset; do
                [ -n "$asset" ] || continue
                if [ "$asset" != "${{ steps.pick.outputs.name }}" ]; then
                  gh release delete-asset "$tag" "$asset" -y || true
                fi
              done <<< "$existing_assets"
            fi
            gh release upload "$tag" "${{ steps.pick.outputs.path }}" --clobber
          else
            gh release create "$tag" "${{ steps.pick.outputs.path }}" --title "$title" --notes "$notes"
          fi
