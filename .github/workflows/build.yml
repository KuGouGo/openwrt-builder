name: build

on:
  workflow_dispatch:

concurrency:
  group: openwrt-x86_64-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      OPENWRT_TARGET: x86
      OPENWRT_SUBTARGET: 64
      OPENWRT_PROFILE: generic
      OPENWRT_FS: squashfs
      OPENWRT_IMAGE: combined-efi.img.gz
      ROOTFS_PARTSIZE: 600
      KERNEL_PARTSIZE: 32
      MIRROR_BASE: https://mirrors.tuna.tsinghua.edu.cn/openwrt
      PACKAGES_FILE: cfg/pkgs.txt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq tar zstd rsync gh

      - name: Get latest release
        id: rel
        shell: bash
        run: |
          set -euo pipefail
          json="$(curl --retry 3 --retry-all-errors --connect-timeout 15 --max-time 60 -fsSL https://api.github.com/repos/openwrt/openwrt/releases/latest)"
          tag="$(printf '%s' "$json" | jq -r '.tag_name')"
          ver="${tag#v}"
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "failed to get latest official release" >&2
            exit 1
          fi
          file="openwrt-${ver}-${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}-${OPENWRT_PROFILE}-${OPENWRT_FS}-${OPENWRT_IMAGE}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ver=$ver" >> "$GITHUB_OUTPUT"
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Download imagebuilder
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ steps.rel.outputs.ver }}"
          file="openwrt-imagebuilder-${ver}-${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}.Linux-x86_64.tar.zst"
          url="${MIRROR_BASE}/releases/${ver}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}/${file}"
          curl --retry 3 --retry-all-errors --connect-timeout 20 --max-time 180 -fL "$url" -o ib.tar.zst
          tar --zstd -xf ib.tar.zst
          mv openwrt-imagebuilder-* imagebuilder

      - name: Prepare files
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ steps.rel.outputs.ver }}"
          mkdir -p imagebuilder/files
          if [ -d files ]; then
            rsync -a files/ imagebuilder/files/
          fi
          mkdir -p imagebuilder/files/etc/apk/repositories.d
          printf '%s\n' \
            "${MIRROR_BASE}/releases/${ver}/packages/x86_64/base" \
            "${MIRROR_BASE}/releases/${ver}/packages/x86_64/luci" \
            "${MIRROR_BASE}/releases/${ver}/packages/x86_64/packages" \
            "${MIRROR_BASE}/releases/${ver}/packages/x86_64/routing" \
            "${MIRROR_BASE}/releases/${ver}/packages/x86_64/telephony" \
            > imagebuilder/files/etc/apk/repositories.d/distfeeds.list
          if [ -x scripts/tune.sh ]; then
            scripts/tune.sh imagebuilder "$ver"
          fi

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          pkgs="$(grep -vE '^\s*($|#)' "${GITHUB_WORKSPACE}/${PACKAGES_FILE}" | tr '\n' ' ' | xargs)"
          cd imagebuilder
          make image \
            PROFILE="${OPENWRT_PROFILE}" \
            PACKAGES="$pkgs" \
            FILES="files" \
            ROOTFS_PARTSIZE="${ROOTFS_PARTSIZE}" \
            KERNEL_PARTSIZE="${KERNEL_PARTSIZE}"

      - name: Pick final image
        id: pick
        shell: bash
        run: |
          set -euo pipefail
          want="${{ steps.rel.outputs.file }}"
          src="$(find "imagebuilder/bin/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}" -type f -name "*${OPENWRT_PROFILE}*${OPENWRT_FS}*${OPENWRT_IMAGE}" | head -n 1)"
          if [ -z "$src" ]; then
            echo "final image not found" >&2
            find imagebuilder/bin/targets -maxdepth 3 -type f | sort >&2 || true
            exit 1
          fi
          mkdir -p out
          cp -f "$src" "out/$want"
          echo "path=out/$want" >> "$GITHUB_OUTPUT"
          echo "name=$want" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.rel.outputs.tag }}"
          ver="${{ steps.rel.outputs.ver }}"
          title="OpenWrt ${ver} x86_64 build"
          notes=$'Based on official OpenWrt release.\n\n- Target: x86/64 generic\n- Format: squashfs combined-efi.img.gz\n- Timezone: Asia/Shanghai\n- Mirror: Tsinghua Tuna\n- Rootfs partsize: 600 MB\n- Kernel partsize: 32 MB'
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${{ steps.pick.outputs.path }}" --clobber
          else
            gh release create "$tag" "${{ steps.pick.outputs.path }}" --title "$title" --notes "$notes"
          fi
