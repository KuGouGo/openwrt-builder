name: Build OpenWrt Firmware

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'OpenWrt source repo URL'
        required: false
        default: 'https://github.com/coolsnowwolf/lede'
      repo_branch:
        description: 'Source branch'
        required: false
        default: 'master'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-openwrt.yml'
      - 'files/**'
      - 'openwrt-gha-build.sh'

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      TZ_NAME: Asia/Shanghai
      ROOTFS_PARTSIZE: 800
      KERNEL_PARTSIZE: 64
      CUSTOM_PACKAGES: >-
        luci luci-i18n-base-zh-cn bash curl wget ca-bundle ca-certificates
        coreutils nano htop iperf3 tcping git git-http unzip
        luci-app-ttyd luci-app-upnp luci-app-ddns luci-app-filetransfer
        luci-app-argon-config luci-theme-argon
      # 可选：指定目标平台/设备，按你的源码实际 target 修改
      TARGET_PROFILE: >-
        CONFIG_TARGET_x86=y
        CONFIG_TARGET_x86_64=y
        CONFIG_TARGET_x86_64_DEVICE_generic=y
      # 可选：附加第三方 feed
      CUSTOM_FEEDS_GIT: |
        # src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git
        # src-git passwall_luci https://github.com/xiaorouji/openwrt-passwall.git

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache cmake cpio curl device-tree-compiler flex \
            gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged \
            help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
            libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool \
            lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pip python3-ply python3-docutils qemu-utils rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: Build firmware
        env:
          REPO_URL: ${{ github.event.inputs.repo_url || 'https://github.com/coolsnowwolf/lede' }}
          REPO_BRANCH: ${{ github.event.inputs.repo_branch || 'master' }}
          WORKDIR: ${{ github.workspace }}/openwrt
        run: |
          chmod +x ./openwrt-gha-build.sh
          ./openwrt-gha-build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: artifacts/
          if-no-files-found: error
